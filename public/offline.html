<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f172a">
    <title>GatewayAPI Offline</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --panel: rgba(15, 23, 42, 0.86);
            --line: rgba(148, 163, 184, 0.18);
            --ink: #edf2f7;
            --muted: #b6c2cf;
            --accent: #fb923c;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(251, 146, 60, 0.2), transparent 28%),
                radial-gradient(circle at right center, rgba(125, 211, 252, 0.16), transparent 24%),
                linear-gradient(180deg, #111827 0%, var(--bg) 100%);
        }

        main {
            width: min(32rem, 100%);
            padding: 1.75rem;
            border-radius: 1.5rem;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: 0 24px 72px rgba(2, 6, 23, 0.35);
        }

        img {
            width: 4rem;
            height: 4rem;
            display: block;
            margin-bottom: 1rem;
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2rem, 7vw, 2.8rem);
            line-height: 1;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.25rem;
            padding: 0.85rem 1.15rem;
            border-radius: 999px;
            background: var(--accent);
            color: #111827;
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <img src="/assets/icons/app-icon.svg" alt="GatewayAPI">
        <h1>คุณออฟไลน์อยู่ตอนนี้</h1>
        <p>GatewayAPI โหลดหน้าเดิมที่ cache ไว้ได้บางส่วน แต่คำขอที่ต้องใช้เครือข่ายจะรอจนกว่าจะเชื่อมต่ออินเทอร์เน็ตอีกครั้ง</p>
        <a href="/">ลองใหม่</a>
    </main>
</body>
</html>
